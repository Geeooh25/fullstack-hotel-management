<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GEEOOH HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .container-box {
            max-width: 450px;
            margin: 80px auto;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .floating-cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gold);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .floating-cart i { font-size: 1.5rem; color: white; }
        .floating-cart .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">GEEOOH HOTEL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/amenities.html">Amenities</a></li>
                    <li class="nav-item"><a class="nav-link" href="/booking-lookup.html">My Booking</a></li>
                    <li class="nav-item" id="authNav"><a class="nav-link" href="/login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="floating-cart" id="floatingCart">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <div class="container">
        <div class="container-box">
            <h2 class="text-center mb-4">Reset Password</h2>
            <p class="text-muted text-center mb-4">Enter your email to receive a password reset link</p>
            
            <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>
            <div id="successMsg" class="alert alert-success" style="display: none;"></div>
            
            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <button type="submit" class="btn-gold w-100">Send Reset Link</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.style.display = 'block';
                    successDiv.textContent = data.message || 'Reset link sent! Check your email.';
                    document.getElementById('resetForm').reset();
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Failed to send reset link';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'An error occurred. Please try again.';
            }
        });
        
        document.getElementById('floatingCart').addEventListener('click', () => {
            window.location.href = '/cart.html';
        });
        
        function updateCartCount() {
            const cartCount = document.getElementById('cartCount');
            if (cartCount && typeof hotelCart !== 'undefined') {
                cartCount.innerText = hotelCart.getItemCount();
            }
        }
        updateCartCount();
    </script>
</body>
</html>
