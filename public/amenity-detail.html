<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details - GEEOOH HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .menu-item-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .menu-item-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
        .add-to-cart-btn { background: var(--gold); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .add-to-cart-btn:hover { background: var(--gold-dark); }
        .quantity-selector { width: 80px; text-align: center; margin-right: 0.5rem; border: 1px solid #ddd; border-radius: 4px; padding: 0.25rem; }
        .appointment-picker { margin-top: 0.75rem; display: block; }
        .appointment-picker input { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        
        /* Floating cart icon */
        .floating-cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gold);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        .floating-cart:hover {
            transform: scale(1.1);
            background: var(--gold-dark);
        }
        .floating-cart i {
            font-size: 1.5rem;
            color: white;
        }
        .floating-cart .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        .cart-summary {
            background: var(--gray-bg);
            padding: 1.5rem;
            border-radius: 12px;
            position: sticky;
            top: 100px;
        }
        
        .page-hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1575429198097-0414ec08e8cd?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 350px;
            display: flex;
            align-items: center;
            text-align: center;
            color: white;
            margin-top: 0;
            padding-top: 80px;
        }
        
        @media (max-width: 768px) {
            .floating-cart {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
            .menu-item-card { text-align: center; }
            .col-md-4.text-end { text-align: center !important; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">GEEOOH HOTEL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/amenities.html">Amenities</a></li>
                    <li class="nav-item"><a class="nav-link" href="/gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/booking-lookup.html">My Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
                    <li class="nav-item" id="authNav">
                        <a class="nav-link" href="/login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Floating Cart Icon -->
    <div class="floating-cart" id="floatingCart">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <div class="page-hero" id="heroSection">
        <div class="container">
            <h1 id="amenityName">Loading...</h1>
            <p id="amenityDescription"></p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8" id="menuContainer">
                <div class="text-center py-5"><div class="loader"></div></div>
            </div>
            <div class="col-lg-4">
                <div class="cart-summary">
                    <h4>Your Cart</h4>
                    <div id="cartPreview"></div>
                    <a href="/cart.html" class="btn-gold w-100 text-center mt-3" style="display: inline-block;">View Cart</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h4>GEEOOH HOTEL</h4>
                    <p>123 Luxury Avenue<br>Beverly Hills, CA 90210</p>
                </div>
            </div>
            <hr>
            <div class="text-center">
                <small>&copy; 2025 Geeooh Hotel. All rights reserved.</small>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amenityId = urlParams.get('id');
        
        async function loadAmenity() {
            try {
                const response = await fetch(`/api/amenities/${amenityId}`);
                const data = await response.json();
                if (data.success) {
                    const amenity = data.amenity;
                    document.getElementById('amenityName').innerText = amenity.name;
                    document.getElementById('amenityDescription').innerText = amenity.short_description;
                    
                    const heroSection = document.getElementById('heroSection');
                    if (amenity.image_url) {
                        heroSection.style.background = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${amenity.image_url}')`;
                        heroSection.style.backgroundSize = 'cover';
                        heroSection.style.backgroundPosition = 'center';
                    }
                    
                    if (amenity.menu_categories && amenity.menu_categories.length) {
                        renderMenu(amenity.menu_categories);
                    } else {
                        document.getElementById('menuContainer').innerHTML = '<p class="text-center text-muted">No menu items available for this service.</p>';
                    }
                }
            } catch (error) {
                console.error('Error loading amenity:', error);
                showToast('Error loading service details', 'error');
            }
        }
        
        function renderMenu(categories) {
            const container = document.getElementById('menuContainer');
            if (!container) return;
            
            let html = '';
            for (const cat of categories) {
                html += `<h3 class="mt-3 mb-3">${escapeHtml(cat.name)}</h3>`;
                for (const item of cat.items) {
                    html += `
                        <div class="menu-item-card" data-id="${item.id}" data-name="${escapeHtml(item.name)}" data-price="${item.price}" data-requires="${item.requires_appointment}">
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <h5>${escapeHtml(item.name)}</h5>
                                    <p class="text-muted">${escapeHtml(item.description || '')}</p>
                                    ${item.duration_minutes ? `<small><i class="fas fa-clock"></i> ${item.duration_minutes} min</small>` : ''}
                                    <div><strong>$${parseFloat(item.price).toFixed(2)}</strong></div>
                                </div>
                                <div class="col-md-4 text-end">
                                    <input type="number" class="quantity-selector" value="1" min="1" id="qty-${item.id}">
                                    <button class="add-to-cart-btn" onclick="addToCart(${item.id}, '${escapeHtml(item.name).replace(/'/g, "\\'")}', ${item.price}, ${item.requires_appointment})">
                                        <i class="fas fa-cart-plus"></i> Add
                                    </button>
                                    ${item.requires_appointment ? `<div class="appointment-picker" id="appt-${item.id}"><input type="datetime-local" class="form-control" id="datetime-${item.id}" placeholder="Select appointment time"></div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        function addToCart(id, name, price, requiresAppointment) {
            const quantityInput = document.getElementById(`qty-${id}`);
            if (!quantityInput) {
                showToast('Error: Could not find quantity field', 'error');
                return;
            }
            
            const quantity = parseInt(quantityInput.value);
            if (isNaN(quantity) || quantity < 1) {
                showToast('Please enter a valid quantity', 'warning');
                return;
            }
            
            let appointmentTime = null;
            
            if (requiresAppointment) {
                const datetimeInput = document.getElementById(`datetime-${id}`);
                if (datetimeInput) {
                    appointmentTime = datetimeInput.value;
                    if (!appointmentTime) {
                        showToast('Please select an appointment time', 'warning');
                        return;
                    }
                }
            }
            
            try {
                hotelCart.addItem({
                    menu_item_id: id,
                    name: name,
                    price: price,
                    quantity: quantity,
                    special_instructions: '',
                    appointment_time: appointmentTime,
                    category: 'paid'
                });
                updateCartPreview();
                showToast(`${name} added to cart!`, 'success');
            } catch (error) {
                console.error('Error adding to cart:', error);
                showToast('Error adding item to cart', 'error');
            }
        }
        
        function updateCartPreview() {
            const cart = hotelCart.getCart();
            const container = document.getElementById('cartPreview');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-muted">Your cart is empty</p>';
            } else {
                let itemsHtml = '';
                for (const item of cart) {
                    itemsHtml += `
                        <div class="d-flex justify-content-between mb-2">
                            <span>${escapeHtml(item.name)} x${item.quantity}</span>
                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `;
                }
                container.innerHTML = itemsHtml + `<hr><strong>Total: $${hotelCart.getTotal().toFixed(2)}</strong>`;
            }
            updateCartCount();
        }
        
        function updateCartCount() {
            const cartCountElem = document.getElementById('cartCount');
            if (cartCountElem && typeof hotelCart !== 'undefined') {
                cartCountElem.innerText = hotelCart.getItemCount();
            }
        }
        
        async function updateAuthNav() {
            if (typeof Auth !== 'undefined') {
                await Auth.updateNav();
            }
        }
        
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<div class="d-flex justify-content-between align-items-center"><span>${message}</span><button class="btn btn-sm btn-link" onclick="this.parentElement.parentElement.remove()">&times;</button></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Floating cart click
        const floatingCart = document.getElementById('floatingCart');
        if (floatingCart) {
            floatingCart.addEventListener('click', () => {
                window.location.href = '/cart.html';
            });
        }
        
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (navbar) {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            }
        });
        
        // Initialize
        loadAmenity();
        updateCartPreview();
        updateAuthNav();
        
        // Listen for cart updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'hotelCart') {
                updateCartPreview();
            }
        });
    </script>
</body>
</html>
