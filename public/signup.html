<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - GEEOOH HOTEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .signup-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .google-btn {
            background: #4285F4;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        .google-btn:hover {
            background: #357ae8;
            color: white;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
        }
        .guest-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .page-hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 400px;
            display: flex;
            align-items: center;
            text-align: center;
            color: white;
            margin-top: 0;
            padding-top: 80px;
        }
        .page-hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }
        @media (max-width: 768px) {
            .page-hero {
                min-height: 300px;
            }
            .page-hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar - Simple nav for auth pages -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">GEEOOH HOTEL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/amenities.html">Amenities</a></li>
                    <li class="nav-item"><a class="nav-link" href="/booking-lookup.html">My Booking</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Hero with Background Image -->
    <div class="page-hero">
        <div class="container">
            <h1>Join GEEOOH HOTEL</h1>
            <p>Create an account to save your booking history and enjoy faster checkout</p>
        </div>
    </div>

    <!-- No Floating Cart on Signup Page -->

    <div class="container">
        <div class="signup-container">
            <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>
            <div id="successMsg" class="alert alert-success" style="display: none;"></div>
            
            <form id="signupForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" id="firstName" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="lastName" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                    <small class="text-muted">Minimum 6 characters</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-gold w-100">Create Account</button>
            </form>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <a href="/auth/google" class="google-btn">
                <i class="fab fa-google"></i> Sign up with Google
            </a>
            
            <div class="guest-link">
                <a href="/" class="text-muted">Continue as Guest →</a>
                <p class="mt-3 mb-0">
                    <small>Already have an account? <a href="/login.html">Sign In</a></small>
                </p>
            </div>
        </div>
    </div>

    <footer class="footer mt-5">
        <div class="container">
            <div class="text-center">
                <small>&copy; 2025 Geeooh Hotel. All rights reserved.</small>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name: firstName,
                        last_name: lastName,
                        email,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.style.display = 'block';
                    successDiv.textContent = 'Account created successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Signup failed';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'An error occurred. Please try again.';
            }
        });
        
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });
    </script>
</body>
</html>
